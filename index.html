<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grup Kicaw - Avatar Sync Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #ff85a1; --pink-dark: #f06292; --glass: rgba(255, 255, 255, 0.35); --glass-border: rgba(255, 255, 255, 0.5); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 10px; overflow: hidden; }
        .main-wrapper { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; height: 100%; position: relative; }
        
        .group-header { background: var(--glass); backdrop-filter: blur(15px); border-radius: 50px; padding: 10px; border: 1px solid var(--glass-border); text-align: center; flex-shrink: 0; z-index: 10; }
        .group-header h2 { color: white; font-size: 1rem; letter-spacing: 2px; }

        .chat-container { flex: 1; background: var(--glass); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid var(--glass-border); display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 5; }
        
        header { padding: 10px 15px; background: rgba(255, 255, 255, 0.2); display: flex; align-items: center; border-bottom: 1px solid var(--glass-border); cursor: pointer; flex-shrink: 0; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; margin-right: 10px; object-fit: cover; }
        .user-name { font-weight: 600; color: #444; font-size: 0.85rem; }

        #chat-window { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; position: relative; -webkit-overflow-scrolling: touch; }
        
        .msg-row { display: flex; gap: 8px; align-items: flex-end; width: 100%; }
        .msg-row.me { flex-direction: row-reverse; }
        
        .msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid white; }
        
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 0.85rem; word-wrap: break-word; position: relative; z-index: 2; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .msg.me { background: var(--pink); color: white; border-bottom-right-radius: 2px; }
        .msg.other { background: white; color: #444; border-bottom-left-radius: 2px; }
        .msg img { width: 100%; border-radius: 12px; margin: 5px 0; display: block; }
        .msg.sticker-msg { background: none !important; padding: 0 !important; box-shadow: none !important; }
        .msg.sticker-msg img { width: 130px; height: 130px; border-radius: 0; }
        .time { font-size: 0.6rem; display: block; margin-top: 4px; text-align: right; opacity: 0.7; }

        .bottom-section { flex-shrink: 0; background: rgba(255,255,255,0.1); }
        .reaction-bar { display: flex; justify-content: center; gap: 12px; padding: 6px; }
        .re-btn { font-size: 1.2rem; cursor: pointer; background: none; border: none; transition: 0.2s; }
        .re-btn:active { transform: scale(1.2); }

        .input-area { padding: 8px 12px; display: flex; gap: 8px; background: rgba(255,255,255,0.2); align-items: center; }
        #msg-input { flex: 1; padding: 10px 15px; border-radius: 20px; border: none; outline: none; background: white; font-size: 16px; }
        .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; background: white; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }

        .screen { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; padding: 20px; border-radius: 20px; width: 100%; max-width: 350px; text-align: center; overflow-y: auto; max-height: 90vh; }
        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        .primary-btn { width:100%; padding:12px; background:var(--pink); color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer; }
        
        .dev-section { margin-top: 20px; padding-top: 15px; border-top: 1px dotted #ccc; font-size: 0.8rem; color: #666; }
        .dev-item { margin-bottom: 5px; display: block; text-decoration: none; color: #444; }
        
        #reaction-zone { position: absolute; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
        .floating-emoji { position: absolute; bottom: 0; font-size: 2rem; animation: flyUpChat 2s ease-out forwards; }
        @keyframes flyUpChat { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-400px) translateX(var(--randX)) scale(1.2); opacity: 0; } }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="group-header"><h2>GRUP KICAW ✨</h2></div>
        
        <div class="chat-container">
            <header onclick="openSettings()">
                <img id="my-avatar" class="avatar" src="img/foto1.jpg">
                <div>
                    <p id="my-name" class="user-name">Memuat...</p>
                    <p style="font-size: 0.6rem; color: var(--pink-dark); font-weight: 600;">Klik Profil & Pengaturan</p>
                </div>
            </header>

            <div id="chat-window"><div id="reaction-zone"></div></div>
            
            <div id="sticker-panel" style="display:none; grid-template-columns:repeat(3,1fr); gap:10px; padding:15px; background:white; position:absolute; bottom:110px; left:15px; right:15px; border-radius:20px; z-index:100; box-shadow:0 -5px 20px rgba(0,0,0,0.1);"></div>
            
            <div class="bottom-section">
                <div class="reaction-bar">
                    <button class="re-btn" onclick="sendReaction('❤️')">❤️</button>
                    <button class="re-btn" onclick="sendReaction('😂')">😂</button>
                    <button class="re-btn" onclick="sendReaction('👍')">👍</button>
                    <button class="re-btn" onclick="sendReaction('🔥')">🔥</button>
                </div>
                <div class="input-area">
                    <button class="icon-btn" onclick="toggleStickers()">😊</button>
                    <button class="icon-btn" onclick="document.getElementById('file-input').click()">📎</button>
                    <input type="file" id="file-input" hidden accept="image/*">
                    <input type="text" id="msg-input" placeholder="Ketik pesan..." onfocus="window.scrollToBottom()">
                    <button id="send-btn" class="icon-btn" style="background:var(--pink); color:white;">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PREVIEW GAMBAR -->
    <div id="preview-screen" class="screen hidden">
        <div class="modal">
            <h3>Kirim Gambar?</h3>
            <img id="image-to-preview" style="width:100%; max-height:250px; object-fit:contain; border-radius:15px; margin:15px 0;">
            <div style="display:flex; gap:10px;">
                <button onclick="closePreview()" class="primary-btn" style="background:#888;">Batal</button>
                <button id="confirm-send-btn" class="primary-btn">Kirim</button>
            </div>
        </div>
    </div>

    <!-- LOGIN -->
    <div id="login-screen" class="screen">
        <div class="modal">
            <h3>Masuk Kicaw</h3>
            <input type="tel" id="phone" placeholder="Nomor HP">
            <input type="text" id="reg-name" placeholder="Nama Panggilan">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="handleLogin()" class="primary-btn">Mulai</button>
        </div>
    </div>

    <!-- SETTINGS / PROFIL -->
    <div id="settings-screen" class="screen hidden">
        <div class="modal">
            <h3>Profil Saya</h3>
            <div id="avatar-list" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:15px;"></div>
            <input type="text" id="edit-name" placeholder="Nama">
            <input type="password" id="edit-pass" placeholder="Password Baru">
            <button onclick="saveProfile()" class="primary-btn" style="margin-bottom: 10px;">Simpan Perubahan</button>
            <button onclick="handleLogout()" style="width:100%; padding:10px; background:#fefefe; color:#ff4757; border:1px solid #ff4757; border-radius:12px; cursor:pointer; font-weight:600;">Logout</button>
            <div class="dev-section">
                <p style="margin-bottom: 8px; font-weight: 600; color: #999;">KONTAK PENGEMBANG</p>
                <a href="https://wa.me/6285692107849" target="_blank" class="dev-item">💬 WhatsApp: <b>085692107849</b></a>
                <a href="https://www.instagram.com/ahzaaaa.hxiy?igsh=MW5zNGVscTJramVpcw==" target="_blank" class="dev-item">📸 Instagram: <b>@ahzaaaa.hxiy</b></a>
                <a href="https://app.u.shopeepay.co.id/u/qsX9eS6EgzsSmx2aUwNda" target="_blank" class="dev-item">☕ Traktir Kopi: <b>ShopeePay</b></a>
                <p onclick="closeSettings()" style="margin-top:15px; cursor:pointer; font-weight: 600; color: #ccc;">[ TUTUP ]</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, get, set, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAMaHdoCynL939eZ0cwlfuF0KXgOp-ES1A",
            authDomain: "familychat-3fbdf.firebaseapp.com",
            databaseURL: "https://familychat-3fbdf-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "familychat-3fbdf",
            storageBucket: "familychat-3fbdf.firebasestorage.app",
            messagingSenderId: "500764657014",
            appId: "1:500764657014:web:18ccba50cfc06db124a657"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhQd4UpiGrIFhehQ91HmmsYnvhpTkWIxppxmdqYrqyd_4SFQ5cIeZzbUnzk31527kx/exec";

        let currentUser = localStorage.getItem('chat_phone') || "";
        let currentPass = localStorage.getItem('chat_pass') || "";
        let selectedAvatar = "img/foto1.jpg";
        let tempFileData = null;

        window.scrollToBottom = () => {
            setTimeout(() => {
                const win = document.getElementById('chat-window');
                win.scrollTop = win.scrollHeight;
            }, 300);
        };

        function fixDriveUrl(url) {
            if (!url) return "";
            if (url.includes("drive.google.com") || url.includes("googleusercontent.com")) {
                const match = url.match(/[-\w]{25,}/);
                if (match) return `https://lh3.googleusercontent.com/u/0/d/${match[0]}`;
            }
            return url;
        }

        window.handleLogin = async (p, s) => {
            const phone = p || document.getElementById('phone').value.trim();
            const pass = s || document.getElementById('pass').value.trim();
            if(!phone || !pass) { alert("Isi Nomor HP dan Password!"); return; }
            
            try {
                const snap = await get(ref(db, 'users/' + phone));
                if (snap.exists() && snap.val().password === pass) loginSuccess(phone, pass, snap.val());
                else if (!snap.exists()) {
                    const newUser = { password: pass, name: document.getElementById('reg-name').value || "Anggota Kicaw", avatar: "img/foto1.jpg" };
                    await set(ref(db, 'users/' + phone), newUser);
                    loginSuccess(phone, pass, newUser);
                } else { alert("Sandi Salah!"); location.reload(); }
            } catch (err) { alert("Gagal koneksi ke server!"); console.log(err); }
        };

        function loginSuccess(phone, pass, data) {
            currentUser = phone;
            localStorage.setItem('chat_phone', phone); localStorage.setItem('chat_pass', pass);
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('my-name').innerText = data.name || phone; 
            document.getElementById('my-avatar').src = data.avatar || "img/foto1.jpg";
            selectedAvatar = data.avatar || "img/foto1.jpg";
            initChat(); initReactions(); setupStickers();
        }

        if(currentUser && currentPass) handleLogin(currentUser, currentPass);

        function setupStickers() {
            const p = document.getElementById('sticker-panel'); p.innerHTML = "";
            for(let i=1; i<=6; i++) {
                const img = document.createElement('img');
                img.src = `stiker${i}.jpg`; img.style = "width:100%; aspect-ratio:1; object-fit:cover; cursor:pointer; border-radius:10px;";
                img.onclick = () => {
                    push(ref(db, "messages"), { sender: currentUser, senderName: document.getElementById('my-name').innerText, avatar: selectedAvatar, text: i, isSticker: true, timestamp: serverTimestamp() });
                    toggleStickers();
                };
                p.appendChild(img);
            }
        }
        window.toggleStickers = () => { const p = document.getElementById('sticker-panel'); p.style.display = p.style.display === 'grid' ? 'none' : 'grid'; window.scrollToBottom(); };

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0]; if(!file) return;
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = () => {
                tempFileData = { base64: reader.result.split(',')[1], type: file.type, name: file.name };
                document.getElementById('image-to-preview').src = reader.result;
                document.getElementById('preview-screen').classList.remove('hidden');
            };
        };
        window.closePreview = () => { document.getElementById('preview-screen').classList.add('hidden'); tempFileData = null; };

        document.getElementById('confirm-send-btn').onclick = async () => {
            if(!tempFileData) return;
            const btn = document.getElementById('confirm-send-btn'); btn.innerText = "⏳ Mengirim..."; btn.disabled = true;
            try {
                const response = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(tempFileData) });
                const res = await response.json();
                if(res.status === "success") {
                    const directUrl = fixDriveUrl(res.url);
                    await push(ref(db, "messages"), { sender: currentUser, senderName: document.getElementById('my-name').innerText, avatar: selectedAvatar, text: directUrl, isImage: true, timestamp: serverTimestamp() });
                }
            } catch (e) { alert("Gagal Kirim!"); } finally { btn.innerText = "Kirim"; btn.disabled = false; closePreview(); window.scrollToBottom(); }
        };

        document.getElementById('send-btn').onclick = () => {
            const txt = document.getElementById('msg-input').value.trim();
            if (txt) {
                push(ref(db, "messages"), { sender: currentUser, senderName: document.getElementById('my-name').innerText, avatar: selectedAvatar, text: txt, isSticker: false, isImage: false, timestamp: serverTimestamp() });
                document.getElementById('msg-input').value = "";
                window.scrollToBottom();
            }
        };

        function initChat() {
            const win = document.getElementById('chat-window');
            onChildAdded(ref(db, "messages"), (snap) => {
                const d = snap.val(); 
                const isMe = d.sender === currentUser;
                
                const row = document.createElement('div');
                row.className = `msg-row ${isMe ? 'me' : 'other'}`;
                row.id = "msg-" + snap.key;
                
                let dt = d.timestamp ? new Date(d.timestamp) : new Date();
                let time = dt.getHours().toString().padStart(2,'0') + ":" + dt.getMinutes().toString().padStart(2,'0');
                
                let textContent = d.text || ""; 
                let senderName = d.senderName || d.sender || "Anggota";
                
                // INI PERBAIKANNYA: Kalau punya kita sendiri, selalu pakai avatar yang di header (selectedAvatar)
                let senderAvatar = d.avatar || "img/foto1.jpg";
                if(isMe) {
                    senderAvatar = selectedAvatar;
                }

                let bodyHtml = "";
                if(d.isSticker) bodyHtml = `<img src="stiker${textContent}.jpg">`;
                else if(d.isImage || (textContent.toString().includes("googleusercontent.com"))) bodyHtml = `<img src="${textContent}" loading="lazy">`;
                else if(textContent.toString().includes("drive.google.com")) bodyHtml = `<a href="${textContent}" target="_blank" style="color:inherit; text-decoration:underline;">Buka Link</a>`;
                else bodyHtml = textContent;

                let bubbleHtml = `<div class="msg ${isMe ? 'me' : 'other'} ${d.isSticker ? 'sticker-msg' : ''}" style="cursor:pointer;">
                    <small style="font-size:0.6rem; display:block; opacity:0.8; font-weight:600;">${isMe ? 'Anda' : senderName}</small>
                    ${bodyHtml}
                    <span class="time">${time}</span>
                </div>`;
                
                row.innerHTML = `<img src="${senderAvatar}" class="msg-avatar"> ${bubbleHtml}`;
                
                row.querySelector('.msg').onclick = () => {
                    if(isMe && confirm("Hapus Pesan Ini?")) remove(ref(db, "messages/" + snap.key));
                };

                win.appendChild(row); 
                win.scrollTop = win.scrollHeight;
            });
            onChildRemoved(ref(db, "messages"), (snap) => { document.getElementById("msg-" + snap.key)?.remove(); });
        }

        window.sendReaction = (emoji) => push(ref(db, "reactions"), { emoji: emoji, time: Date.now() });
        function initReactions() {
            onChildAdded(ref(db, "reactions"), (snap) => {
                const d = snap.val(); if (Date.now() - d.time > 5000) return;
                const el = document.createElement('div'); el.className = 'floating-emoji'; el.innerText = d.emoji;
                el.style.left = Math.random() * 80 + 10 + '%'; el.style.setProperty('--randX', (Math.random() * 200 - 100) + 'px');
                document.getElementById('reaction-zone').appendChild(el); setTimeout(() => el.remove(), 2000);
            });
        }

        window.openSettings = () => {
            document.getElementById('settings-screen').classList.remove('hidden');
            const list = document.getElementById('avatar-list'); list.innerHTML = "";
            for(let i=1; i<=6; i++){
                const url = `img/foto${i}.jpg`; const img = document.createElement('img'); img.src = url;
                img.style = "width:100%; aspect-ratio:1; border-radius:50%; object-fit:cover; cursor:pointer; border:3px solid " + (selectedAvatar === url ? 'var(--pink)' : 'transparent');
                img.onclick = () => { selectedAvatar = url; openSettings(); }; list.appendChild(img);
            }
        };
        window.closeSettings = () => document.getElementById('settings-screen').classList.add('hidden');
        window.saveProfile = async () => {
            let up = { avatar: selectedAvatar, name: document.getElementById('edit-name').value || document.getElementById('my-name').innerText };
            if(document.getElementById('edit-pass').value) up.password = document.getElementById('edit-pass').value;
            await update(ref(db, 'users/' + currentUser), up); location.reload();
        };
        window.handleLogout = () => { localStorage.clear(); location.reload(); };
    </script>
</body>
</html>
